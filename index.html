<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0d1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Nifty 50" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Nifty 50 Live</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d1a;
      --surface: #13132a;
      --surface2: #1a1a35;
      --border: rgba(255,255,255,0.07);
      --text: #e8e8f0;
      --muted: #6b6b8a;
      --up: #00e676;
      --down: #ff3d71;
      --up-dim: rgba(0,230,118,0.12);
      --down-dim: rgba(255,61,113,0.12);
      --gold: #f5c842;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      overflow-x: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* ── Sticky ticker strip ── */
    #ticker-strip {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      backdrop-filter: blur(12px);
      transition: border-color 0.4s;
    }
    #ticker-strip.up { border-bottom-color: rgba(0,230,118,0.35); }
    #ticker-strip.down { border-bottom-color: rgba(255,61,113,0.35); }

    .ticker-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ticker-label {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-transform: uppercase;
    }

    #live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    #live-dot.live {
      background: var(--up);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(0,230,118,0.5); }
      70%  { box-shadow: 0 0 0 7px rgba(0,230,118,0); }
      100% { box-shadow: 0 0 0 0 rgba(0,230,118,0); }
    }

    .ticker-right {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    #strip-price {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      transition: color 0.3s;
    }

    #strip-change {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
    }
    .up #strip-change  { color: var(--up); }
    .down #strip-change { color: var(--down); }

    /* ── Main content ── */
    main {
      flex: 1;
      padding: 20px 16px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Big price card ── */
    #price-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px 20px 20px;
      position: relative;
      overflow: hidden;
    }
    #price-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--muted);
      transition: background 0.4s;
    }
    #price-card.up::before  { background: var(--up); }
    #price-card.down::before { background: var(--down); }

    .index-name {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    #main-price {
      font-family: 'Syne', sans-serif;
      font-size: 48px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      transition: color 0.3s;
    }
    @keyframes flashUp   { 0%,100%{color:var(--text)} 40%{color:var(--up)} }
    @keyframes flashDown { 0%,100%{color:var(--text)} 40%{color:var(--down)} }
    #main-price.flash-up   { animation: flashUp   0.7s ease; }
    #main-price.flash-down { animation: flashDown 0.7s ease; }

    #change-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .change-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 600;
      background: var(--up-dim);
      color: var(--up);
    }
    .change-pill.down-pill {
      background: var(--down-dim);
      color: var(--down);
    }
    .arrow { font-style: normal; font-size: 11px; }

    #change-abs {
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }

    #market-status {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.03em;
    }

    /* ── Stats row ── */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
    }

    .stat-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat-val {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }
    .stat-val.green { color: var(--up); }
    .stat-val.red   { color: var(--down); }

    /* ── Sparkline ── */
    #chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px 16px 12px;
    }
    .chart-header {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }
    #sparkline { width: 100%; height: 80px; display: block; }

    /* ── Footer ── */
    footer {
      text-align: center;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.05em;
      padding-bottom: 8px;
    }

    /* ── Loading state ── */
    .shimmer {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
      height: 1em;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  </style>
</head>
<body>
<script type="module" src="https://widgets.tradingview-widget.com/w/en/tv-mini-chart.js"></script>

<tv-mini-chart symbol="NASDAQ:AAPL"></tv-mini-chart>
  <!-- Sticky ticker strip -->
  <div id="ticker-strip">
    <div class="ticker-left">
      <span id="live-dot"></span>
      <span class="ticker-label">Nifty 50</span>
    </div>
    <div class="ticker-right">
      <span id="strip-price">—</span>
      <span id="strip-change">Loading…</span>
    </div>
  </div>

  <main>
    <!-- Big price card -->
    <div id="price-card">
      <div class="index-name">NSE · Nifty 50</div>
      <div id="main-price">—</div>
      <div id="change-row">
        <span class="change-pill" id="pct-pill"><em class="arrow">▲</em> —%</span>
        <span id="change-abs">—</span>
      </div>
      <div id="market-status">
        <span id="mkt-state">Fetching…</span>
        <span id="last-time">—</span>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Day High</div>
        <div class="stat-val green" id="day-high">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Day Low</div>
        <div class="stat-val red" id="day-low">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Prev Close</div>
        <div class="stat-val" id="prev-close">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Open</div>
        <div class="stat-val" id="open-val">—</div>
      </div>
    </div>

    <!-- Sparkline -->
    <div id="chart-card">
      <div class="chart-header">Today's movement</div>
      <svg id="sparkline" viewBox="0 0 300 80" preserveAspectRatio="none"></svg>
    </div>

    <footer>Data via Yahoo Finance &nbsp;·&nbsp; Refreshes every 30s</footer>
  </main>

  <script>
    const fmt = n => n?.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) ?? '—';
    let lastPrice = null;

    async function fetchNifty() {
      try {
        const r = await fetch('https://query1.finance.yahoo.com/v8/finance/chart/%5ENSEI?interval=5m&range=1d');
        const d = await r.json();
        const res = d.chart.result[0];
        const meta = res.meta;

        const price = meta.regularMarketPrice;
        const prev  = meta.previousClose || meta.chartPreviousClose;
        const open  = meta.regularMarketOpen;
        const high  = meta.regularMarketDayHigh;
        const low   = meta.regularMarketDayLow;
        const chg   = price - prev;
        const pct   = (chg / prev) * 100;
        const isUp  = chg >= 0;
        const sign  = isUp ? '+' : '';

        // Price flash
        const mp = document.getElementById('main-price');
        if (lastPrice !== null && lastPrice !== price) {
          mp.classList.remove('flash-up','flash-down');
          void mp.offsetWidth;
          mp.classList.add(isUp ? 'flash-up' : 'flash-down');
        }
        lastPrice = price;

        // Strip
        const strip = document.getElementById('ticker-strip');
        strip.className = isUp ? 'up' : 'down';
        document.getElementById('strip-price').textContent = fmt(price);
        document.getElementById('strip-change').textContent = `${sign}${pct.toFixed(2)}%`;

        // Card
        document.getElementById('price-card').className = isUp ? 'up' : 'down';
        mp.textContent = fmt(price);

        const pill = document.getElementById('pct-pill');
        pill.innerHTML = `<em class="arrow">${isUp ? '▲' : '▼'}</em> ${sign}${pct.toFixed(2)}%`;
        pill.className = `change-pill ${isUp ? '' : 'down-pill'}`;
        document.getElementById('change-abs').textContent = `${sign}${fmt(chg)}`;

        // Stats
        document.getElementById('day-high').textContent = fmt(high);
        document.getElementById('day-low').textContent = fmt(low);
        document.getElementById('prev-close').textContent = fmt(prev);
        document.getElementById('open-val').textContent = fmt(open);

        // Time
        const t = new Date(meta.regularMarketTime * 1000);
        document.getElementById('last-time').textContent =
          t.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', timeZone:'Asia/Kolkata' }) + ' IST';
        document.getElementById('mkt-state').textContent =
          meta.marketState === 'REGULAR' ? 'Market Open' : 'Market Closed';

        document.getElementById('live-dot').className = 'live';

        // Sparkline
        const closes = res.indicators?.quote?.[0]?.close?.filter(Boolean);
        if (closes && closes.length > 1) drawSparkline(closes, isUp);

      } catch(e) {
        document.getElementById('mkt-state').textContent = 'Error fetching data';
      }
    }

    function drawSparkline(data, isUp) {
      const svg = document.getElementById('sparkline');
      const W = 300, H = 80, pad = 4;
      const min = Math.min(...data);
      const max = Math.max(...data);
      const range = max - min || 1;

      const pts = data.map((v, i) => {
        const x = pad + (i / (data.length - 1)) * (W - pad * 2);
        const y = H - pad - ((v - min) / range) * (H - pad * 2);
        return `${x},${y}`;
      });

      const lineColor = isUp ? 'var(--up)' : 'var(--down)';
      const fillColor = isUp ? 'rgba(0,230,118,0.08)' : 'rgba(255,61,113,0.08)';
      const lastPt = pts[pts.length - 1].split(',');

      svg.innerHTML = `
        <defs>
          <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="${lineColor}" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="${lineColor}" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <path d="M${pts.join('L')} L${lastPt[0]},${H - pad} L${pad},${H - pad} Z"
              fill="url(#sg)" stroke="none"/>
        <polyline points="${pts.join(' ')}"
                  fill="none" stroke="${lineColor}" stroke-width="1.5"
                  stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="${lastPt[0]}" cy="${lastPt[1]}" r="3"
                fill="${lineColor}"/>
      `;
    }

    fetchNifty();
    setInterval(fetchNifty, 30000);

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
